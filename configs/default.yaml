llm:
  model: gpt-oss:120b
  base_url: https://ollama.com/api/chat
  api_key_env: OLLAMA_API_KEY
  temperature: 0.1
  timeout: 120
  max_retries: 3

workflow:
  label: runtime-skill-audit
  num_tasks: 2
  run_mode: execute
  max_repair_attempts: 4

paths:
  output_dir: ./outputs
  source_workspace: .openclaw/workspace
  source_config: .openclaw/openclaw.json
  memory_dir: ./outputs/memory
  defense_assets_dir: CIK-Bench/defense_assets

runtime:
  openclaw_binary: openclaw
  thinking: low
  timeout_seconds: 180
  local: true
  receiver_url: ""

sandbox:
  default_image: rsa_sandbox
  allow_network_for_browser: true
  read_only_root: false
  cap_drop: []
  capability_images:
    curl: rsa_sandbox
    jq: rsa_sandbox
    git: rsa_sandbox

memory:
  enabled: true
  max_case_memories: 32
  max_prompt_memories: 6
